name: Docker CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Show files
        run: ls -la

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t test-bbs .

      - name: Tag Image
        run: docker tag test-bbs ${{ secrets.DOCKER_USERNAME }}/python-bbs-app:latest

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/python-bbs-app:latest
