name: Docker CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t testimage .

      - name: Tag Image
        run: |
          docker tag testimage ${{ secrets.DOCKER_USERNAME }}/python-bbs-app:latest

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/python-bbs-app:latest
